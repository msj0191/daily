# Daily WSJ·NYT briefing — runs every morning at 06:00 KST.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   NYT_API_KEY        — https://developer.nytimes.com  (Most Popular + Article Search)
#   SLACK_TOKEN        — Slack Bot User OAuth Token (chat:write to #wsj-nyt)
#   ANTHROPIC_API_KEY  — https://console.anthropic.com/settings/keys (for Korean summary)
#
# Optional repository variable:
#   SLACK_CHANNEL      — channel ID override (default: C0B13399JG3 = #wsj-nyt)
#
# Manual trigger:
#   gh workflow run wsj-nyt-daily.yml          # run now from default branch
#   gh workflow run wsj-nyt-daily.yml -r BRANCH  # run from a non-default branch
#
# NOTE: GitHub cron only fires on the default branch. Merge this workflow file
# into the default branch for the schedule to take effect.

name: Daily WSJ·NYT Briefing

on:
  schedule:
    # 21:00 UTC == 06:00 KST (next day)
    - cron: "0 21 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: wsj-nyt-daily
  cancel-in-progress: false

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch news (NYT API + RSS + HN + Reddit)
        env:
          NYT_API_KEY: ${{ secrets.NYT_API_KEY }}
        run: python wsj_nyt_briefing.py

      - name: Build & post to Slack
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_CHANNEL: ${{ vars.SLACK_CHANNEL || 'C0B13399JG3' }}
        run: python build_wsj_nyt_message.py

      - name: Commit JSON snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/briefing/
          if git diff --cached --quiet; then
            echo "no new data to commit"
          else
            git commit -m "data: WSJ·NYT briefing $(date -u +%Y-%m-%d)"
            git push
          fi
